syntax = "proto3";
package hello.v1;

// Greeter service defines the SayHello rpc method.
service Greeter {
    // SayHello rpc accepts a HelloRequest message and returns a HelloReply message.
    rpc SayHello (HelloRequest) returns (HelloReply) {}
}

// HelloRequest message contains the name to be greeted.
message HelloRequest {
    string name = 1;
}

// HelloReply message contains the greeting message.
message HelloReply {
    string message = 1;
}
